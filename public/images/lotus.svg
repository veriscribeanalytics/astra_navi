<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" aria-label="Glowing lotus on water">
  <defs>
    <radialGradient id="haloGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="petalLarge" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="30%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>

    <linearGradient id="petalSmall" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="40%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="35%" stop-color="#fde047" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerCore" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>

    <radialGradient id="waterDisc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="80%" stop-color="#0891b2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="waterCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#a5f3fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bubble" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#67e8f9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>

  <ellipse cx="180" cy="125" rx="160" ry="115" fill="url(#haloGlow)"/>

  <g fill="#ffffff">
    <circle cx="55" cy="55" r="1.4" opacity="0.9"/>
    <circle cx="305" cy="65" r="1.6" opacity="0.85"/>
    <circle cx="40" cy="135" r="1" opacity="0.7"/>
    <circle cx="325" cy="155" r="1.3" opacity="0.8"/>
    <circle cx="90" cy="30" r="0.9" opacity="0.7"/>
    <circle cx="270" cy="40" r="1.1" opacity="0.8"/>
    <circle cx="20" cy="90" r="1" opacity="0.6"/>
  </g>

  <ellipse cx="180" cy="210" rx="170" ry="28" fill="url(#waterDisc)"/>
  <ellipse cx="180" cy="200" rx="65" ry="11" fill="url(#waterCenter)"/>

  <g stroke="#a5f3fc" stroke-width="0.6" opacity="0.4" stroke-linecap="round" filter="url(#softGlow)">
    <line x1="180" y1="200" x2="42" y2="212"/>
    <line x1="180" y1="200" x2="318" y2="212"/>
    <line x1="180" y1="200" x2="85" y2="228"/>
    <line x1="180" y1="200" x2="275" y2="228"/>
    <line x1="180" y1="200" x2="180" y2="232"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <ellipse cx="180" cy="225" rx="162" ry="13" stroke="#22d3ee" stroke-width="0.8" opacity="0.22" filter="url(#glow)"/>
    <ellipse cx="180" cy="220" rx="132" ry="11" stroke="#22d3ee" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
    <ellipse cx="180" cy="214" rx="100" ry="8" stroke="#67e8f9" stroke-width="1.2" opacity="0.62"/>
    <ellipse cx="180" cy="209" rx="70" ry="6" stroke="#a5f3fc" stroke-width="1.4" opacity="0.8"/>
    <ellipse cx="180" cy="205" rx="40" ry="4" stroke="#cffafe" stroke-width="1.3" opacity="0.92"/>
    <ellipse cx="180" cy="202" rx="18" ry="2.5" stroke="#ecfeff" stroke-width="1.1"/>
  </g>

  <ellipse cx="180" cy="120" rx="100" ry="85" fill="#a855f7" opacity="0.3" filter="url(#bigGlow)"/>

  <g stroke="#e9d5ff" stroke-width="0.6">
    <path d="M180 180 C158 130 162 70 180 30 C198 70 202 130 180 180 Z" fill="url(#petalLarge)" opacity="0.95"/>
    <path d="M180 180 C140 158 108 105 115 50 C152 78 175 130 180 180 Z" fill="url(#petalLarge)" opacity="0.92"/>
    <path d="M180 180 C220 158 252 105 245 50 C208 78 185 130 180 180 Z" fill="url(#petalLarge)" opacity="0.92"/>
    <path d="M180 180 C125 168 75 138 68 88 C115 100 165 138 180 180 Z" fill="url(#petalLarge)" opacity="0.88"/>
    <path d="M180 180 C235 168 285 138 292 88 C245 100 195 138 180 180 Z" fill="url(#petalLarge)" opacity="0.88"/>
    <path d="M180 180 C130 188 80 178 60 145 C115 145 165 162 180 180 Z" fill="url(#petalLarge)" opacity="0.82"/>
    <path d="M180 180 C230 188 280 178 300 145 C245 145 195 162 180 180 Z" fill="url(#petalLarge)" opacity="0.82"/>
  </g>

  <g stroke="#fae8ff" stroke-width="0.6">
    <path d="M180 182 C170 148 175 110 180 88 C185 110 190 148 180 182 Z" fill="url(#petalSmall)"/>
    <path d="M180 182 C152 175 130 152 130 118 C155 132 175 158 180 182 Z" fill="url(#petalSmall)" opacity="0.96"/>
    <path d="M180 182 C208 175 230 152 230 118 C205 132 185 158 180 182 Z" fill="url(#petalSmall)" opacity="0.96"/>
    <path d="M180 182 C160 182 138 173 138 152 C160 158 176 168 180 182 Z" fill="url(#petalSmall)"/>
    <path d="M180 182 C200 182 222 173 222 152 C200 158 184 168 180 182 Z" fill="url(#petalSmall)"/>
  </g>

  <circle cx="180" cy="150" r="35" fill="url(#centerGlow)" filter="url(#bigGlow)" opacity="0.85"/>
  <circle cx="180" cy="150" r="20" fill="url(#centerGlow)"/>

  <g>
    <ellipse cx="180" cy="155" rx="10" ry="14" fill="url(#centerCore)"/>
    <path d="M180 158 C175 153 175 145 180 140 C185 145 185 153 180 158 Z" fill="#fef9c3" opacity="0.95"/>
    <path d="M174 156 C172 150 175 143 180 142 L180 158 Z" fill="#fef08a" opacity="0.8"/>
    <path d="M186 156 C188 150 185 143 180 142 L180 158 Z" fill="#fef08a" opacity="0.8"/>
    <circle cx="180" cy="146" r="2" fill="#ffffff"/>
  </g>

  <g stroke="#cffafe" stroke-width="0.9" opacity="0.95" stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <path d="M95 213 L95 219 M91.8 216 L98.2 216 M93 213.8 L97 218.2 M97 213.8 L93 218.2"/>
    <path d="M265 213 L265 219 M261.8 216 L268.2 216 M263 213.8 L267 218.2 M267 213.8 L263 218.2"/>
    <path d="M130 224 L130 228 M128 226 L132 226"/>
    <path d="M235 222 L235 226 M233 224 L237 224"/>
    <path d="M55 208 L55 211 M53.5 209.5 L56.5 209.5"/>
    <path d="M305 207 L305 210 M303.5 208.5 L306.5 208.5"/>
  </g>

  <g fill="#ecfeff">
    <circle cx="60" cy="220" r="0.9" opacity="0.7"/>
    <circle cx="300" cy="218" r="1" opacity="0.8"/>
    <circle cx="155" cy="227" r="0.7" opacity="0.6"/>
    <circle cx="210" cy="227" r="0.7" opacity="0.6"/>
    <circle cx="120" cy="231" r="0.8" opacity="0.55"/>
    <circle cx="245" cy="231" r="0.8" opacity="0.55"/>
  </g>

  <circle cx="335" cy="195" r="6" fill="url(#bubble)" opacity="0.7"/>
  <circle cx="25" cy="200" r="5" fill="url(#bubble)" opacity="0.6"/>
  <circle cx="345" cy="220" r="4" fill="url(#bubble)" opacity="0.55"/>
  <circle cx="15" cy="225" r="3.5" fill="url(#bubble)" opacity="0.5"/>
</svg>
